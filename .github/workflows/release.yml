name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # necesario para crear releases y subir assets

jobs:
  build-windows:
    name: Windows — build & publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Extrae "1.2.3" del tag "v1.2.3" y actualiza version.json
      # Así el .exe embebe la versión correcta para el auto-update
      - name: Stamp version.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $json = Get-Content version.json | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json | Set-Content version.json
          Write-Host "Version stamped: $version"

      - name: Install Python dependencies
        run: pip install customtkinter pyinstaller

      - name: Download rclone
        shell: pwsh
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile rclone.zip -UseBasicParsing
          Expand-Archive -Path rclone.zip -DestinationPath rclone_tmp -Force
          Get-ChildItem -Path rclone_tmp -Filter rclone.exe -Recurse `
            | Select-Object -First 1 `
            | Copy-Item -Destination .
          Remove-Item rclone_tmp, rclone.zip -Recurse -Force

      - name: Build with PyInstaller
        run: python -m PyInstaller drive_downloader.spec --clean --noconfirm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CloudDownloader.exe
          generate_release_notes: true

  build-macos:
    name: macOS — build & publish
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stamp version.json
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          python3 -c "
          import json, pathlib
          p = pathlib.Path('version.json')
          d = json.loads(p.read_text())
          d['version'] = '$version'
          p.write_text(json.dumps(d, indent=2))
          "
          echo "Version stamped: $version"

      - name: Install Python dependencies
        run: pip install customtkinter pyinstaller

      - name: Download rclone
        run: |
          ARCH=$(uname -m)
          if [[ "$ARCH" == "arm64" ]]; then
            URL="https://downloads.rclone.org/rclone-current-osx-arm64.zip"
          else
            URL="https://downloads.rclone.org/rclone-current-osx-amd64.zip"
          fi
          curl -fsSL "$URL" -o rclone.zip
          unzip -q -j rclone.zip "*/rclone" -d .
          chmod +x rclone
          rm rclone.zip

      - name: Build with PyInstaller
        run: python3 -m PyInstaller drive_downloader.spec --clean --noconfirm

      - name: Remove quarantine attribute
        run: xattr -rd com.apple.quarantine "dist/CloudDownloader.app" 2>/dev/null || true

      - name: Create .dmg
        run: |
          mkdir -p dist/dmg_tmp
          cp -r "dist/CloudDownloader.app" dist/dmg_tmp/
          ln -s /Applications dist/dmg_tmp/Applications
          hdiutil create \
            -volname "CloudDownloader" \
            -srcfolder dist/dmg_tmp \
            -ov -format UDZO \
            dist/CloudDownloader.dmg
          rm -rf dist/dmg_tmp

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CloudDownloader.dmg
          generate_release_notes: false   # ya se generó en el job de Windows
